<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNPI Routine Pro by M. H. Mahim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --primary: #2e7d32; 
            --on-primary: #ffffff;
            --primary-container: #c8e6c9;
            --on-primary-container: #003300;
            --bg: #fbfdf7;
            --surface: #ffffff;
            --surface-variant: #f2f6eb;
            --outline: #72796f;
            --highlight: #e8f5e9;
            --room-bg: #e8f5e9;
            --room-text: #1b5e20;
            --room-border: #c8e6c9;
            --empty-bg: #f5f8f3;
            --hover-cell-bg: #f1f8e9;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --hover-shadow: 0 12px 30px rgba(46, 125, 50, 0.18);
            --today-border: #4caf50;
            --text-main: #1a1c18;
            --text-muted: rgba(26, 28, 24, 0.8);
        }

        [data-theme="dark"] {
            --primary: #81c784;
            --on-primary: #003300;
            --primary-container: #1b5e20;
            --on-primary-container: #c8e6c9;
            --bg: #121410;
            --surface: #1e201b; 
            --surface-variant: #2d3029; 
            --outline: #8b9388;
            --highlight: #283324;
            --room-bg: #2d452b; 
            --room-text: #c8e6c9; 
            --room-border: #4caf50;
            --empty-bg: #1a1c18;
            --hover-cell-bg: #354230;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            --hover-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
            --text-main: #e2e3dd; 
            --text-muted: rgba(226, 227, 221, 0.85); 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 1100px; margin: 15px auto; padding: 0 12px; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: inset 0 0 0px var(--today-border); } 50% { box-shadow: inset 0 0 10px var(--today-border); } 100% { box-shadow: inset 0 0 0px var(--today-border); } }
        
        .animate { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* ========= SMART HEADER LAYOUT ========= */
        .header {
            background: var(--surface); padding: 18px 15px; border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--outline);
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; position: relative; z-index: 50;
        }

        .title-area { width: 100%; }
        .title-area h1 { 
            margin: 0; 
            font-size: clamp(1.15rem, 5vw, 1.45rem); 
            color: var(--primary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            letter-spacing: -0.5px;
        }
        .title-area p { margin: 2px 0 0 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

        .header-bottom {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
        }

        .live-clock { 
            font-size: 0.82rem; font-weight: 600; color: var(--primary); 
            background: var(--primary-container); padding: 10px 14px; 
            border-radius: 12px; display: inline-flex; 
            align-items: center; gap: 8px; flex-wrap: wrap; margin: 0;
            border: 1px solid var(--primary-container);
        }

        /* Square Icons with Rounded Corners (Squircle) */
        .action-btns { 
            display: flex !important; flex-direction: row !important; gap: 10px !important; 
            align-items: center; flex-wrap: nowrap !important; 
        }
        
        .btn-icon { 
            background: var(--primary-container); color: var(--primary); 
            border: 1px solid var(--primary-container); 
            width: 42px !important; height: 42px !important; 
            border-radius: 12px !important; 
            cursor: pointer; transition: 0.3s; 
            display: flex !important; align-items: center !important; justify-content: center !important; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); flex-shrink: 0 !important; 
        }
        .btn-icon:hover { 
            transform: scale(1.08); background: var(--primary); color: var(--on-primary); 
            box-shadow: 0 4px 12px rgba(46,125,50,0.3); border-color: var(--primary);
        }

        /* Table Section */
        .table-wrapper {
            background: var(--surface); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--outline);
            overflow-x: auto; margin-bottom: 25px; scroll-behavior: smooth; position: relative; z-index: 10;
        }

        table { width: 100%; min-width: 950px; border-collapse: collapse; text-align: center; }
        th, td { padding: 10px 6px; border: 1px solid var(--outline); transition: 0.2s; }
        
        th { 
            background: var(--primary-container); color: var(--on-primary-container); 
            font-weight: 700; padding: 12px 8px; font-size: 0.95rem; cursor: pointer;
        }
        th:hover { background: var(--highlight); transform: scale(1.02); } 
        
        .time-header { background: var(--primary) !important; color: var(--on-primary) !important; cursor: default; }
        .time-header:hover { transform: none; }
        
        .time-col { background: var(--surface-variant); color: var(--text-main); white-space: normal; line-height: 1.3; }
        
        .filled-cell { cursor: pointer; }
        .filled-cell:hover { background: var(--hover-cell-bg); transform: scale(1.01); }
        
        .empty-cell { background: var(--empty-bg); color: var(--text-muted); font-weight: 600; font-size: 1.1rem; pointer-events: none; opacity: 0.5; }

        .highlight-col-bg { background-color: var(--highlight) !important; }
        th.highlight-today { border: 2px solid var(--today-border) !important; border-bottom: none !important; animation: pulseGlow 2.5s infinite alternate; }

        .sub-name { font-weight: 700; color: var(--primary); font-size: 0.85rem; line-height: 1.2; margin-bottom: 3px; display: block;}
        .room-no { font-size: 0.68rem; background: var(--room-bg); color: var(--room-text); border: 1px solid var(--room-border); padding: 1px 8px; border-radius: 12px; font-weight: 600; display: inline-block; margin-top: 3px; }

        /* Today Classes Button */
        .today-btn-wrapper { text-align: center; margin-bottom: 35px; }
        .btn-large {
            background: var(--primary); color: white; border: none; padding: 14px 28px;
            border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 1.05rem;
            display: inline-flex; align-items: center; gap: 8px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }
        .btn-large:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4); }

        /* Teacher Grid */
        .section-title { text-align: center; color: var(--primary); font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }
        .teacher-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 40px; }
        
        .card {
            background: var(--surface); padding: 18px; border-radius: var(--radius);
            border: 1px solid var(--outline); box-shadow: var(--shadow);
            cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;
        }
        .card:hover { transform: translateY(-6px); box-shadow: var(--hover-shadow); }
        .card h3 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.05rem; padding-right: 40px; }
        .card .desig { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .card .details { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }

        /* Modal / Pop-up */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }
        
        .modal-content {
            background: var(--surface); padding: 25px; border-radius: 20px;
            max-width: 450px; width: 90%; position: relative; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25); transform: translateY(30px); transition: transform 0.3s ease;
        }
        .modal.show .modal-content { transform: translateY(0); }
        .modal-close { position: absolute; top: 15px; right: 15px; cursor: pointer; color: var(--outline); background: var(--surface-variant); border-radius: 50%; padding: 4px; transition: 0.2s; z-index: 10;}
        .modal-close:hover { background: #ff4c4c; color: white; transform: rotate(90deg); }

        .modal-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .m-btn {
            padding: 12px 15px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.92rem;
            display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; flex: 1; min-width: 110px; justify-content: center;
        }
        .btn-call { background: var(--primary); color: white; }
        .btn-save { background: var(--primary-container); color: var(--primary); }
        .btn-share { background: var(--surface-variant); color: var(--text-main); }

        .teacher-link { color: var(--primary); text-decoration: underline; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .teacher-link:hover { opacity: 0.7; }

        /* Expanded Modal Container */
        .classes-list-container {
            max-height: 65vh; 
            overflow-y: auto; 
            background: var(--surface-variant); 
            border-radius: 15px;
            padding: 5px;
        }

        /* Clickable Item in List */
        .day-class-item {
            text-align: left; padding: 12px; border-bottom: 1px solid var(--outline); 
            display: flex; gap: 12px; align-items: center; cursor: pointer; transition: 0.2s;
            border-radius: 10px; margin-bottom: 2px; background: var(--surface);
        }
        .day-class-item:hover {
            background-color: var(--highlight);
            transform: translateX(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .day-class-item:last-child { border-bottom: none; }

        /* Toast */
        .toast-notification {
            visibility: hidden; min-width: 250px; background-color: var(--primary); color: var(--on-primary);
            text-align: center; border-radius: 30px; padding: 12px 24px; position: fixed;
            z-index: 3000; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
            opacity: 0; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.4s ease;
        }
        .toast-notification.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Footer */
        footer { padding: 30px 0; border-top: 1px solid var(--outline); text-align: center; margin-top: 40px; }
        .social-icons { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .s-icon { width: 42px; height: 42px; background: var(--primary-container); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s; }
        .s-icon:hover { background: var(--primary); color: white; transform: translateY(-5px); }
    </style>
</head>
<body>

    <script>
        (function() {
            const hour = new Date().getHours();
            if (hour < 6 || hour >= 18) {
                document.body.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <div class="container">

    <div class="modal" id="global-modal">
        <div class="modal-content">
            <span class="material-icons-round modal-close" onclick="closeModal()">close</span>
            <div id="modal-body"></div>
        </div>

        <span class="material-icons-round" id="toast-icon">check_circle</span>
        <span id="toast-message">Successfully!</span>
    </div>

    <script>
        // ==========================================
        // 🔒 DATA CENTER
        // ==========================================
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday"];
        const periods = [
            { id: 1, name: "1st", time: "01:30 PM - 02:15 PM" },
            { id: 2, name: "2nd", time: "02:15 PM - 03:00 PM" },
            { id: 3, name: "3rd", time: "03:00 PM - 03:45 PM" },
            { id: 4, name: "4th", time: "03:45 PM - 04:30 PM" },
            { id: 5, name: "5th", time: "04:30 PM - 05:15 PM" },
            { id: 6, name: "6th", time: "05:15 PM - 06:00 PM" },
            { id: 7, name: "7th", time: "06:00 PM - 06:45 PM" }
        ];

        const routineData = [
            { day: "Sunday", period: 1, sub: "Electrical Circuits-II", code: "MAS", room: "EWM" },
            { day: "Sunday", period: 2, sub: "Electrical Circuits-II", code: "MAS", room: "EWM" },
            { day: "Sunday", period: 3, sub: "Physics-II", code: "AQZ", room: "S-316" },
            { day: "Sunday", period: 4, sub: "Digital Ent-1", code: "MR", room: "S-316" },
            { day: "Sunday", period: 5, sub: "Computer App", code: "MHR", room: "Software Lab" },
            { day: "Sunday", period: 6, sub: "Computer App", code: "MHR", room: "Software Lab" },
            
            { day: "Monday", period: 1, sub: "Digital Ent-1", code: "MR", room: "Digital Ent" },
            { day: "Monday", period: 2, sub: "Digital Ent-1", code: "MR", room: "Digital Ent" },
            { day: "Monday", period: 3, sub: "Electrical Circuits-II", code: "MAS", room: "S-316" },
            { day: "Monday", period: 4, sub: "Power Electronics", code: "DS", room: "S-316" },
            { day: "Monday", period: 5, sub: "Mathematics-III", code: "MA", room: "S-316" },

            { day: "Tuesday", period: 1, sub: "Power Electronics", code: "DS", room: "S-316" },
            { day: "Tuesday", period: 2, sub: "Digital Ent-1", code: "MR", room: "S-316" },
            { day: "Tuesday", period: 3, sub: "Mathematics-III", code: "MA", room: "S-316" },
            { day: "Tuesday", period: 4, sub: "Mathematics-III", code: "MA", room: "S-316" },
            { day: "Tuesday", period: 5, sub: "Physics-II", code: "AQZ", room: "S-316" },

            { day: "Wednesday", period: 1, sub: "Electrical Circuits-II", code: "MAS", room: "S-316" },
            { day: "Wednesday", period: 2, sub: "Physics-II", code: "AQZ", room: "S-316" },
            { day: "Wednesday", period: 3, sub: "Power Electronics", code: "DS", room: "Basic Ent Lab" },
            { day: "Wednesday", period: 4, sub: "Power Electronics", code: "DS", room: "Basic Ent Lab" },
            { day: "Wednesday", period: 5, sub: "Mathematics-III", code: "MA", room: "S-316" },

            { day: "Thursday", period: 1, sub: "Computer App", code: "MHR", room: "Software Lab" },
            { day: "Thursday", period: 2, sub: "Computer App", code: "MHR", room: "Software Lab" },
            { day: "Thursday", period: 3, sub: "Mathematics-III", code: "MA", room: "S-316" },
            { day: "Thursday", period: 4, sub: "Electrical Circuits-II", code: "MAS", room: "S-316" },
            { day: "Thursday", period: 5, sub: "Physics-II", code: "AQZ", room: "Physics Lab" },
            { day: "Thursday", period: 6, sub: "Physics-II", code: "AQZ", room: "Physics Lab" }
        ];

        const teacherData = [
            { name: "Md. Delowar Syed", code: "DS", sub: "Power Electronics (26832)", phone: "01776895558", desig: "Jr. Instructor (Tech/Electronics)" },
            { name: "Mahabubul Alam", code: "MA", sub: "Mathematics-III (25931)", phone: "01745867997", desig: "Jr. Instructor (Non-Tech/Math)" },
            { name: "Md. Abdul Quader Zilani", code: "AQZ", sub: "Physics-II (25922)", phone: "01717928560", desig: "Instructor (Non-Tech/Physics)" },
            { name: "Md. Halim Reja", code: "MHR", sub: "Computer Office Application (28511)", phone: "01717701784", desig: "Instructor (Tech/Electronics)" },
            { name: "Md. Abdus Salam", code: "MAS", sub: "Electrical Circuits-II (26731)", phone: "01763248085", desig: "Jr. Instructor (Tech/Electrical)" },
            { name: "Md. Masud Rana", code: "MR", sub: "Digital Electronics-1 (26831)", phone: "01766796427", desig: "Jr. Instructor (Tech/Electronics)" }
        ];

        // ==========================================
        // SYSTEM LOGIC
        // ==========================================

        function init() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const teacherCont = document.getElementById('teacher-container');

            days.forEach(day => {
                const th = document.createElement('th');
                th.id = `th-${day}`; th.textContent = day;
                th.onclick = () => showClassesByDay(day);
                th.title = `Click to view ${day}'s classes`;
                head.appendChild(th);
            });

            const skipMap = {};

            periods.forEach(p => {
                const tr = document.createElement('tr');
                
                const timeParts = p.time.split(' - ');
                tr.innerHTML = `<td class="time-col">
                    <div style="font-size:0.9rem; color:var(--primary); font-weight:700; margin-bottom:4px;">${p.name}</div>
                    <div style="font-size:0.8rem; font-weight:600;">${timeParts[0]}</div>
                    <div style="font-size:0.65rem; opacity:0.6; margin:2px 0;">to</div>
                    <div style="font-size:0.8rem; font-weight:600;">${timeParts[1]}</div>
                </td>`;
                
                days.forEach(day => {
                    const key = `${day}-${p.id}`;
                    if (skipMap[key]) return;

                    const classInfo = routineData.find(r => r.day === day && r.period === p.id);
                    const td = document.createElement('td');
                    td.id = `cell-${day}-${p.id}`;
                    
                    if (classInfo) {
                        let span = 1;
                        for (let nextId = p.id + 1; nextId <= periods.length; nextId++) {
                            const nextClass = routineData.find(r => r.day === day && r.period === nextId);
                            if (nextClass && nextClass.sub === classInfo.sub && nextClass.code === classInfo.code) {
                                span++; skipMap[`${day}-${nextId}`] = true;
                            } else break;
                        }

                        if (span > 1) td.rowSpan = span;
                        td.className = "filled-cell";
                        td.innerHTML = `<div style="padding:4px;"><span class="sub-name">${classInfo.sub}</span><span style="font-size:0.75rem; font-weight:600; opacity:0.8;">${classInfo.code}</span><br><span class="room-no">${classInfo.room}</span></div>`;
                        td.onclick = () => showClassModal(classInfo, p.time);
                    } else {
                        td.className = "empty-cell"; td.textContent = "-";
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

            teacherData.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div style="position:absolute; top:15px; right:15px; background:var(--primary-container); color:var(--primary); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><span class="material-icons-round" style="font-size:18px;">open_in_new</span></div>
                                  <h3>${t.name}</h3>
                                  <div class="desig">${t.sub}</div>
                                  <div class="details"><span class="material-icons-round" style="font-size:16px;">phone_iphone</span> ${t.phone}</div>`;
                card.onclick = () => showTeacherModal(t);
                teacherCont.appendChild(card);
            });

            updateLiveClock();
            updateHighlights();
            setTimeout(triggerFullScroll, 1200);
        }

        function triggerFullScroll() {
            const wrapper = document.getElementById('table-scroll');
            const max = wrapper.scrollWidth - wrapper.clientWidth;
            if (max > 0) {
                wrapper.scrollTo({ left: max, behavior: 'smooth' });
                setTimeout(() => wrapper.scrollTo({ left: 0, behavior: 'smooth' }), 1200);
            }
        }

        function updateLiveClock() {
            const now = new Date();
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            document.getElementById('time-display').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateLiveClock, 1000);

        function updateHighlights() {
            const today = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][new Date().getDay()];
            document.querySelectorAll('th, td').forEach(el => el.classList.remove('highlight-col-bg', 'highlight-today'));
            if (days.includes(today)) {
                const th = document.getElementById(`th-${today}`);
                if (th) th.classList.add('highlight-today');
                document.querySelectorAll(`[id^="cell-${today}"]`).forEach(td => td.classList.add('highlight-col-bg'));
            }
        }

        function openModal() {
            const m = document.getElementById('global-modal'); m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
        }

        function closeModal() {
            const m = document.getElementById('global-modal'); m.classList.remove('show');
            setTimeout(() => m.style.display = 'none', 300);
        }

        function openClassDetailsFromDay(day, periodId, timeStr) {
            const classInfo = routineData.find(r => r.day === day && r.period === periodId);
            if(classInfo) {
                const modalContent = document.querySelector('.modal-content');
                modalContent.style.transform = 'scale(0.95)';
                modalContent.style.opacity = '0';
                setTimeout(() => {
                    showClassModal(classInfo, timeStr);
                    modalContent.style.transform = 'translateY(0)';
                    modalContent.style.opacity = '1';
                }, 200);
            }
        }

        function showClassModal(info, time) {
            const t = teacherData.find(x => x.code === info.code);
            document.getElementById('modal-body').innerHTML = `
                <div style="width:50px; height:5px; background:var(--primary-container); border-radius:10px; margin:0 auto 15px;"></div>
                <h2 style="color:var(--primary); margin:0 0 10px 0; font-size:1.5rem;">Class Details</h2>
                <div style="font-size:1.3rem; font-weight:700; color:var(--text-main); margin-bottom:15px;">${info.sub}</div>
                <div style="background:var(--surface-variant); padding:15px; border-radius:15px; text-align:left; margin-bottom:15px; color:var(--text-main);">
                    <div><span class="material-icons-round" style="vertical-align:middle; font-size:18px; color:var(--primary);">person</span> <b>Teacher:</b> <span class="teacher-link" onclick="showTeacherModalByCode('${info.code}')">${t ? t.name : info.code}</span></div>
                    <div style="margin-top:8px;"><span class="material-icons-round" style="vertical-align:middle; font-size:18px; color:var(--primary);">room</span> <b>Room:</b> <span class="room-no" style="margin:0">${info.room}</span></div>
                </div>
                <div style="background:var(--primary-container); color:var(--on-primary-container); padding:12px; border-radius:12px; font-weight:700;">
                    <span class="material-icons-round" style="vertical-align:middle;">event</span> ${info.day} &bull; ${time}
                </div>`;
            openModal();
        }

        function showTeacherModalByCode(code) {
            const t = teacherData.find(x => x.code === code);
            if (t) {
                const modalContent = document.querySelector('.modal-content');
                modalContent.style.transform = 'scale(0.95)';
                modalContent.style.opacity = '0';
                setTimeout(() => {
                    showTeacherModal(t);
                    modalContent.style.transform = 'translateY(0)';
                    modalContent.style.opacity = '1';
                }, 200);
            }
        }

        function showTeacherModal(t) {
            document.getElementById('modal-body').innerHTML = `
                <div style="width:50px; height:5px; background:var(--primary-container); border-radius:10px; margin:0 auto 15px;"></div>
                <h2 style="color:var(--primary); margin:0;">Teacher Profile</h2>
                <div style="font-size:1.3rem; font-weight:700; margin-top:10px; color:var(--text-main);">${t.name}</div>
                <div style="font-weight:600; color:var(--primary);">${t.sub}</div>
                <div style="font-size:0.8rem; opacity:0.8; margin-bottom:15px; color:var(--text-main);">${t.desig}</div>
                
                <div style="position:relative; display:flex; align-items:center; justify-content:center; background:var(--highlight); padding:12px 15px; border-radius:12px; border:1px solid var(--primary-container);">
                    <div style="display:flex; align-items:center; gap:8px; font-weight:700; font-size:1.15rem; color:var(--text-main);">
                        <span class="material-icons-round" style="color:var(--primary)">phone</span> ${t.phone}
                    </div>
                    <div onclick="copyPhone('${t.phone}')" style="position:absolute; right:15px; background:var(--primary); color:white; padding:6px; border-radius:8px; cursor:pointer; display:flex; transition:0.2s;" title="Copy">
                        <span class="material-icons-round" style="font-size:18px;">content_copy</span>
                    </div>
                </div>

                <div class="modal-btns">
                    <button class="m-btn btn-call" onclick="window.location.href='tel:${t.phone}'"><span class="material-icons-round">call</span> Call</button>
                    <button class="m-btn btn-save" onclick="saveVCard('${t.name}', '${t.phone}')"><span class="material-icons-round">person_add</span> Save</button>
                    <button class="m-btn btn-share" onclick="shareTeacher('${t.name}', '${t.phone}')"><span class="material-icons-round">share</span> Share</button>
                </div>`;
            openModal();
        }

        function showClassesByDay(dayReq) {
            let targetDay = dayReq;
            let displayTitle = dayReq;

            if (dayReq === 'Today') {
                targetDay = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][new Date().getDay()];
                displayTitle = `Today's Classes <br><span style="font-size:1rem; opacity:0.8;">(${targetDay})</span>`;
            } else {
                displayTitle = `${targetDay}'s Classes`;
            }

            const classes = routineData.filter(r => r.day === targetDay);
            let html = "";
            
            if (classes.length > 0) {
                const uniqueClasses = [];
                let skipNext = 0;
                
                classes.forEach((c, index) => {
                    if (skipNext > 0) { skipNext--; return; }
                    
                    let span = 1;
                    for (let i = index + 1; i < classes.length; i++) {
                        if (classes[i].sub === c.sub && classes[i].code === c.code) span++; else break;
                    }
                    skipNext = span - 1;

                    const startP = periods.find(x => x.id === c.period);
                    const endP = periods.find(x => x.id === (c.period + span - 1));
                    
                    let timeStr = span > 1 ? `${startP.time.split(' - ')[0]} - ${endP.time.split(' - ')[1]}` : startP.time;
                    let periodStr = span > 1 ? `${startP.name} to ${endP.name}` : startP.name;

                    html += `<div class="day-class-item" onclick="openClassDetailsFromDay('${targetDay}', ${c.period}, '${timeStr}')">
                        <div style="background:var(--primary-container); color:var(--on-primary-container); padding:8px; border-radius:10px; font-weight:700; min-width:85px; text-align:center; font-size:0.75rem;">
                            ${periodStr}<br><span style="font-size:0.6rem; opacity:0.8;">${timeStr}</span>
                        </div>
                        <div style="flex:1;">
                            <div style="font-weight:700; color:var(--primary); font-size:0.9rem;">${c.sub}</div>
                            <div style="font-size:0.8rem; opacity:0.8; color:var(--text-main);">${c.code} &bull; ${c.room}</div>
                        </div>
                        <div style="color: var(--primary); opacity: 0.7;">
                            <span class="material-icons-round">chevron_right</span>
                        </div>
                    </div>`;
                });
            } else html = `<div style='padding:40px 20px; text-align:center;'><span class="material-icons-round" style="font-size:50px; color:var(--primary-container);">celebration</span><h3 style="color:var(--primary); margin:10px 0 0 0;">No classes!</h3><p style="opacity:0.8; font-size:0.9rem; color:var(--text-main);">Enjoy your day off.</p></div>`;

            document.getElementById('modal-body').innerHTML = `
                <div style="width:50px; height:5px; background:var(--primary-container); border-radius:10px; margin:0 auto 15px;"></div>
                <h2 style="color:var(--primary); margin:0 0 15px 0;">${displayTitle}</h2>
                <div class="classes-list-container">${html}</div>`;
            openModal();
        }

        function showToast(msg, icon = 'check_circle') {
            const t = document.getElementById("toast"); 
            document.getElementById("toast-message").textContent = msg;
            document.getElementById("toast-icon").textContent = icon;
            t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000);
        }

        function copyPhone(num) { navigator.clipboard.writeText(num).then(() => showToast("Number Copied!")); }

        function shareTeacher(name, num) {
            const txt = `Teacher: ${name}\nPhone: ${num}`;
            if (navigator.share) navigator.share({ title: 'Contact', text: txt }); else copyPhone(txt);
        }

        function saveVCard(name, phone) {
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEND:VCARD`;
            const blob = new Blob([v], { type: "text/vcard" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `${name.replace(/\s/g, '_')}.vcf`; a.click();
            showToast("VCard Downloaded!");
        }

        function toggleTheme() {
            const b = document.body; b.setAttribute("data-theme", b.getAttribute("data-theme") === "dark" ? "" : "dark");
        }

        function toggleView() {
            const vp = document.getElementById("viewport-meta");
            const icon = document.getElementById("view-icon");
            if (vp.content === "width=1024") {
                vp.content = "width=device-width, initial-scale=1.0";
                icon.textContent = "desktop_windows";
            } else {
                vp.content = "width=1024";
                icon.textContent = "phone_iphone";
            }
        }

        init();
    </script>
</body>
</html>
